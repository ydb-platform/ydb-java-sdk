name: slo-report

on:
  workflow_run:
    workflows: ["SLO"]
    types:
      - completed

jobs:
  publish-slo-report:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    name: Publish YDB SLO Report
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Publish YDB SLO Report
        uses: ydb-platform/ydb-slo-action/report@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_run_id: ${{ github.event.workflow_run.id }}

  remove-slo-label:
    if: >-
      github.event.workflow_run.event == 'pull_request'
      && (github.event.workflow_run.conclusion == 'success'
          || github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    name: Remove SLO Label
    permissions:
      pull-requests: write
    steps:
      - name: Remove SLO label from PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRS: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          REPO: ${{ github.event.workflow_run.repository.full_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          PR=$(jq -r '.[0].number // empty' <<<"$PRS")
          if [[ -z "$PR" ]]; then
            # Forks: workflow_run.pull_requests is empty. Look up by head SHA.
            PR=$(curl -sS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/commits/${HEAD_SHA}/pulls" \
              | jq -r '.[0].number // empty')
          fi
          if [[ -z "$PR" ]]; then
            echo "No PR found for head SHA ${HEAD_SHA} — skipping label removal"
            exit 0
          fi
          STATUS=$(curl -sS -X DELETE \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${PR}/labels/SLO" \
            -o /dev/null -w "%{http_code}")
          case "${STATUS}" in
            200|404) echo "SLO label remove on PR #${PR}: HTTP ${STATUS}" ;;
            *)       echo "Failed to remove SLO label: HTTP ${STATUS}" >&2; exit 1 ;;
          esac
